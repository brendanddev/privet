
# =======================================================================
# Local RAG Assistant Configuration
# =======================================================================

# Model settings
llm_model: gemma3:1b
embed_model: nomic-embed-text

# Ollama settings
# Override with OLLAMA_HOST environment variable for Docker
ollama_host: http://localhost:11434
request_timeout: 120.0

# Document processing
chunk_size: 256
chunk_overlap: 25

# Retrieval settings
# How many chunks to retrieve per query
similarity_top_k: 5

# Conversation memory
# How many previous messages to include as context (each exchange = 2 messages)
history_length: 6

# Paths
docs_path: ./documents
chroma_path: ./chroma_db
collection_name: documents
logs_path: ./logs

# Feedback collection
# Set to false to disable rating buttons and stop logging feedback
collect_feedback: true
feedback_path: ./feedback/feedback.jsonl

# Provider: ollama or llamacpp
# Default is ollama — works out of the box after `ollama pull gemma3:1b`
# Switch to llamacpp if you want fully offline inference without Ollama running
provider: ollama

# llama.cpp settings (only used when provider is llamacpp)
# Download from Hugging Face:
#   LLM:    bartowski/google_gemma-3-1b-it-GGUF  (google_gemma-3-1b-it-Q4_K_M.gguf)
#   Embed:  nomic-ai/nomic-embed-text-v1.5-GGUF  (nomic-embed-text-v1.5.Q8_0.gguf)
model_path: ./models/google_gemma-3-1b-it-Q4_K_M.gguf
embed_model_path: ./models/nomic-embed-text-v1.5.Q8_0.gguf
n_gpu_layers: -1
n_ctx: 4096
n_threads: null

# Hybrid search: BM25 + vector retrieval combined with Reciprocal Rank Fusion
# Set to false to use pure vector search (faster, slightly lower recall)
use_hybrid_search: false